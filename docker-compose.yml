services:
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_DATABASE: punto_tecno_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: ./server
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    depends_on:
      - db

volumes:
  db_data: