<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUNTO TECNO S.A | Bienvenido</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/components.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 

</head>
<body class="d-flex flex-column min-vh-100">
    <header>
        <!-- NAVBAR -->
        <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top shadow-sm">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center fw-bold" href="#">
                    <img src="./assets/img/favicon.png" alt="Logo" width="30" height="30" class="me-2">
                    PUNTO TECNO S.A
                </a>
                <!-- BOTÓN HAMBURGUESA -->
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#navOffcanvas" aria-controls="navOffcanvas">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <!-- MENÚ OFFCANVAS (Derecha a Izquierda) -->
                <div class="offcanvas offcanvas-end" tabindex="-1" id="navOffcanvas" aria-labelledby="navOffcanvasLabel">
                    <div class="offcanvas-header border-bottom">
                        <h5 class="offcanvas-title" id="navOffcanvasLabel">Menú Principal</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>                    
                    <div class="offcanvas-body d-flex justify-content-start justify-content-lg-end align-items-start align-items-lg-center"> 
                        <div class="d-flex align-items-center gap-3">
                            <!-- Botón Sol/Luna -->
                            <button id="btn-tema" class="btn btn-outline-warning rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;" title="Cambiar tema">
                                <i id="icono-tema" class="bi bi-sun-fill"></i>
                            </button>
                            <button class="btn btn-sm btn-admin d-lg-none">Admin Login</button>
                            <button class="btn btn-sm btn-admin d-none d-lg-block">Admin Login</button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main class="container flex-grow-1 d-flex align-items-center justify-content-center" style="padding-top: 85px; padding-bottom: 40px;">
        <div class="row w-100 justify-content-center">
            <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">                
                <div class="card card-bienvenida shadow-lg p-4 text-center">
                    <div class="mb-3">
                        <img src="./assets/img/favicon.png" alt="Logo Punto Tecno" class="img-fluid" style="max-width: 70px;">
                    </div>
                    
                    <h2 class="mb-2 fw-bold text-nowrap">¡Bienvenido!</h2>
                    <p class="text-muted mb-4 small">Ingresa tu nombre para poder comenzar a explorar nuestro catálogo de productos.</p>
                    
                    <form id="form-inicio" class="needs-validation" novalidate>
                        <div class="mb-3 text-start">
                            <label for="nombre-usuario" class="form-label fw-semibold">Ingresa tu nombre:</label>
                            <input type="text" class="form-control" id="nombre-usuario" placeholder="Ej: Juan Pérez" required minlength="3">
                            <div class="invalid-feedback">
                                Debes ingresar tu nombre para continuar.
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Continuar</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-body-tertiary text-center py-3 border-top mt-auto">
        <div class="container">
            <p class="text-muted mb-1 fw-medium">TP - Programación III</p>
            <small class="text-muted">Desarrollado por: Busico Lautaro - Pertot Mabel - Raczkowski Martín</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/global.js"></script>
    <script src="./assets/js/pages/bienvenida.js"></script>
</body>
</html>
