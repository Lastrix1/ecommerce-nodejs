<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUNTO TECNO S.A | Comprobante de Compra</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link rel="shortcut icon" href="../assets/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>

<body class="d-flex flex-column min-vh-100 bg-body-tertiary">

    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top shadow-sm">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center fw-bold" href="../index.html">
                    <img src="../assets/img/favicon.png" alt="Logo" width="30" height="30" class="me-2">
                    PUNTO TECNO S.A
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#navOffcanvas" aria-controls="navOffcanvas">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end" tabindex="-1" id="navOffcanvas" aria-labelledby="navOffcanvasLabel">
                    <div class="offcanvas-header border-bottom">
                        <h5 class="offcanvas-title" id="navOffcanvasLabel">Menú Principal</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>                    
                    <div class="offcanvas-body d-flex justify-content-start justify-content-lg-end align-items-start align-items-lg-center"> 
                        <div class="d-flex align-items-center gap-3">
                            <button id="btn-tema" class="btn btn-outline-warning rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;" title="Cambiar tema">
                                <i id="icono-tema" class="bi bi-sun-fill"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5 pt-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-lg-7 col-md-9">
                
                <div class="card card-ticket shadow-lg p-4 p-sm-5 text-center bg-body border-0 rounded-4">
                    <div class="mb-4">
                        <i class="bi bi-check-circle-fill text-success" style="font-size: 4.5rem;"></i>
                    </div>

                    <h1 class="h2 fw-bold mb-2">¡Gracias por tu compra!</h1>
                    <p class="text-muted mb-4">La transacción en <strong>PUNTO TECNO S.A</strong> se procesó correctamente.</p>

                    <div id="detalle-ticket" class="ticket-preview text-start mb-4 p-3 bg-body-tertiary rounded-3 border">
                        <div class="text-center text-muted py-3">
                            <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                            Generando resumen del comprobante...
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center border-top pt-4">
                        <button id="btn-descargar" class="btn btn-primary btn-lg px-4 rounded-pill fs-6 fw-semibold shadow-sm">
                            <i class="bi bi-file-earmark-pdf me-2"></i>Descargar Comprobante PDF
                        </button>
                        <button id="btn-salir" class="btn btn-outline-secondary btn-lg px-4 rounded-pill fs-6">
                            <i class="bi bi-house me-2"></i>Volver al Inicio
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-body-tertiary text-center py-3 border-top mt-auto">
        <div class="container">
            <p class="text-muted mb-1 fw-medium">TP - Programación III</p>
            <small class="text-muted">Desarrollado por: Busico Lautaro - Pertot Mabel - Raczkowski Martín</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/global.js"></script>
    <script src="../assets/js/pages/ticket.js"></script>
</body>
</html>
