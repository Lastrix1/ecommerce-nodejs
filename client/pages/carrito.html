<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto Tecno S.A | Tu Carrito</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="../assets/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body>
    <header>
        <!-- NAVBAR -->
        <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top shadow-sm">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center fw-bold" href="#">
                    <img src="../assets/img/favicon.png" alt="Logo" width="30" height="30" class="me-2">
                    PUNTO TECNO S.A
                </a>
                <!-- BOTÓN HAMBURGUESA -->
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#navOffcanvas">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <!-- MENÚ OFFCANVAS (Derecha a Izquierda) -->
                <div class="offcanvas offcanvas-end" tabindex="-1" id="navOffcanvas" aria-labelledby="navOffcanvasLabel">
                    <div class="offcanvas-header border-bottom">
                        <h5 class="offcanvas-title" id="navOffcanvasLabel">Menú Principal</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>                
                    <div class="offcanvas-body d-flex justify-content-start justify-content-lg-end align-items-start align-items-lg-center"> 
                        <div class="d-flex align-items-center gap-3">
                            <!-- Botón Sol/Luna -->
                            <button id="btn-tema" class="btn btn-outline-warning rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;" title="Cambiar tema">
                                <i id="icono-tema" class="bi bi-sun-fill"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main class="container my-5">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-primary">TU CARRITO</h1>
            <p class="lead">Revisa tus productos antes de finalizar la compra.</p>
        </div>        
        <!-- Carrito -->
        <div class="row g-4">
            <div class="col-lg-8">
                <div id="lista-productos" class="d-flex flex-column gap-3">
                    <!-- Aquí se renderizarán los productos del carrito -->
                </div>
            </div>
            <!-- Resumen de Pago -->
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 p-4 sticky-top" style="top: 100px;">
                    <h4 class="fw-bold mb-4">Resumen</h4>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Productos:</span>
                        <span id="cant-items">0</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-center align-items-center gap-2 flex-wrap mb-4">
                        <span class="h5 fw-bold">Total:</span>
                        <span id="total-resumen" class="h5 fw-bold text-primary">$0</span>
                    </div>
                    <div class="d-grid gap-2">
                        <button id="btn-confirmar" class="btn btn-primary btn-lg py-3 fw-bold shadow-sm">
                            <i class="bi bi-check2-circle me-2"></i>Confirmar Pedido
                        </button>
                        <div class="position-relative my-2">
                            <hr>
                            <span class="position-absolute top-50 start-50 translate-middle px-1 bg-body text-muted small"> o tambien puedes </span>
                        </div>
                        <button onclick="window.salir()" class="btn btn-outline-danger border-0 btn-sm py-2">
                            <i class="bi bi-trash3 me-2"></i>Vaciar carrito
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/global.js"></script>
    <script src="../assets/js/pages/carrito.js"></script>
</body>
</html>
