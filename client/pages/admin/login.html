<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUNTO TECNO S.A | Login Administrador</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="shortcut icon" href="../../assets/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
</head>

<body class="bg-body-tertiary d-flex flex-column min-vh-100">

    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top shadow-sm">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center fw-bold" href="#">
                    <img src="../../assets/img/favicon.png" alt="Logo" width="30" height="30" class="me-2">
                    PUNTO TECNO S.A
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#navOffcanvas" aria-controls="navOffcanvas">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end" tabindex="-1" id="navOffcanvas" aria-labelledby="navOffcanvasLabel">
                    <div class="offcanvas-header border-bottom">
                        <h5 class="offcanvas-title" id="navOffcanvasLabel">Menú Principal</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>                    
                    <div class="offcanvas-body d-flex justify-content-start justify-content-lg-end align-items-start align-items-lg-center"> 
                        <div class="d-flex align-items-center gap-3">
                            <button id="btn-tema" class="btn btn-outline-warning rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;" title="Cambiar tema">
                                <i id="icono-tema" class="bi bi-sun-fill"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center py-5 mt-5">
        <div class="row w-100 justify-content-center">
            <div class="col-sm-10 col-md-7 col-lg-5">
                
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4 p-sm-5">

                        <h2 class="text-center mb-4 fw-bold text-primary">PuntoTecno Admin</h2>

                        <form id="login-form">
                            <div class="mb-3">
                                <label for="email" class="form-label fw-medium">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-body text-muted"><i class="bi bi-envelope"></i></span>
                                    <input type="email" id="email" class="form-control" placeholder="nombre@puntotecno.com" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-medium">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-body text-muted"><i class="bi bi-lock"></i></span>
                                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold text-uppercase shadow-sm">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar al Sistema
                            </button>
                        </form>

                        <a href="../../index.html" class="btn btn-outline-secondary w-100 mt-3 rounded-pill fw-medium">
                            <i class="bi bi-house me-2"></i>Volver al Inicio
                        </a>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-body-tertiary text-center py-3 border-top mt-auto">
        <div class="container">
            <p class="text-muted mb-1 fw-medium">TP - Programación III</p>
            <small class="text-muted">Desarrollado por: Busico Lautaro - Pertot Mabel - Raczkowski Martín</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/global.js"></script>
    <script src="../../assets/js/pages/login.js"></script> 

</body>
</html>
