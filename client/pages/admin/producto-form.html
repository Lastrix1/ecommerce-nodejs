<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUNTO TECNO S.A | Gestión de Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="shortcut icon" href="../../../server/public/images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
</head>

<body class="d-flex flex-column min-vh-100">

    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top shadow-sm">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center fw-bold" href="./dashboard.html">
                    <img src="../../../server/public/images/favicon.png" alt="Logo" width="30" height="30" class="me-2">
                    PUNTO TECNO S.A
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#navOffcanvas" aria-controls="navOffcanvas">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end" tabindex="-1" id="navOffcanvas" aria-labelledby="navOffcanvasLabel">
                    <div class="offcanvas-header border-bottom">
                        <h5 class="offcanvas-title" id="navOffcanvasLabel">Menú Operativo</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>                    
                    <div class="offcanvas-body d-flex justify-content-start justify-content-lg-end align-items-start align-items-lg-center"> 
                        <div class="d-flex align-items-center gap-3">
                            <button id="btn-tema" class="btn btn-outline-warning rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;" title="Cambiar tema">
                                <i id="icono-tema" class="bi bi-sun-fill"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-5 pt-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="card shadow-sm border-0 rounded-4 mb-5">
                    <div class="card-body p-4 p-sm-5">
                        
                        <h1 class="h3 fw-bold mb-4 text-secondary-emphasis border-bottom pb-2">
                            <i class="bi bi-box-seam me-2 text-primary"></i>Ficha de Producto
                        </h1>

                        <form id="form-producto">
                            <div class="mb-3">
                                <label for="nombre" class="form-label fw-semibold">Nombre del Artículo</label>
                                <input type="text" id="nombre" class="form-control" placeholder="Ej: Monitor Gamer 24' IPS" required>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <label for="precio" class="form-label fw-semibold">Precio (ARS)</label>
                                    <div class="input-group">
                                        <span class="input-group-text">$</span>
                                        <input type="number" id="precio" class="form-control" min="0" step="any" placeholder="0.00" required>
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <label for="stock" class="form-label fw-semibold">Unidades en Stock</label>
                                    <input type="number" id="stock" class="form-control" min="0" placeholder="Ej: 15" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="imagen" class="form-label fw-semibold">URL de la Imagen</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-link-45deg"></i></span>
                                    <input type="text" id="imagen" class="form-control" placeholder="Ruta de la imagen...">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="categoria" class="form-label fw-semibold">Categoría Asignada</label>
                                <select id="categoria" class="form-select">
                                    <option value="Hardware">Hardware</option>
                                    <option value="Perifericos">Periféricos</option>
                                </select>
                            </div>

                            <div class="form-check form-switch mb-4 fs-5">
                                <input class="form-check-input" type="checkbox" role="switch" id="activo" checked>
                                <label class="form-check-label small fw-medium" for="activo">Permitir visualización activa en tienda</label>
                            </div>

                            <div class="d-flex gap-2 justify-content-end border-top pt-4">
                                <a href="./dashboard.html" class="btn btn-secondary px-4 rounded-pill">
                                    <i class="bi bi-x-circle me-2"></i>Cancelar
                                </a>
                                <button type="submit" class="btn btn-success px-4 rounded-pill shadow-sm">
                                    <i class="bi bi-check-circle me-2"></i>Guardar Cambios
                                </button>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-body-tertiary text-center py-3 border-top mt-auto">
        <div class="container">
            <p class="text-muted mb-1 fw-medium">TP - Programación III</p>
            <small class="text-muted">Desarrollado por: Busico Lautaro - Pertot Mabel - Raczkowski Martín</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/global.js"></script>
    <script src="../../assets/js/pages/producto-form.js"></script>

</body>
</html>
