<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUNTO TECNO S.A | Catálogo de Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <link class="component-favicon" rel="shortcut icon" href="../../server/public/images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="d-flex flex-column min-vh-100">

    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top shadow-sm">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center fw-bold" href="#">
                    <img src="../../server/public/images/favicon.png" alt="Logo" width="30" height="30" class="me-2">
                    PUNTO TECNO S.A
                </a>
                <span id="usuario-logueado" class="text-muted small d-none">¡Hola, Usuario!</span>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#navOffcanvas" aria-controls="navOffcanvas">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end" tabindex="-1" id="navOffcanvas" aria-labelledby="navOffcanvasLabel">
                    <div class="offcanvas-header border-bottom">
                        <h5 class="offcanvas-title" id="navOffcanvasLabel">Menú Principal</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>                    
                    <div class="offcanvas-body d-flex justify-content-start justify-content-lg-end align-items-start align-items-lg-center"> 
                        <div class="d-flex align-items-center gap-3">
                            <button id="btn-tema" class="btn btn-outline-warning rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;" title="Cambiar tema">
                                <i id="icono-tema" class="bi bi-sun-fill"></i>
                            </button>
                            <button id="btn-logout" class="btn btn-outline-danger ms-2 px-3 rounded-pill d-none" onclick="cerrarSesion()">
                                <i class="bi bi-box-arrow-right me-1"></i>Cerrar Sesión
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-4 pt-5 flex-grow-1">
        
        <section class="barra-filtros shadow-sm p-3 bg-body-secondary bg-opacity-25 rounded-4 mb-4">
            <div class="d-flex flex-wrap gap-2 justify-content-center align-items-center">
                <div class="btn-group" role="group" aria-label="Filtros de categorías">
                    <button class="btn btn-primary px-4" onclick="renderizarTienda('Todos')">Ver Todo</button>
                    <button class="btn btn-outline-primary px-4" onclick="renderizarTienda('Perifericos')">Periféricos</button>
                    <button class="btn btn-outline-primary px-4" onclick="renderizarTienda('Hardware')">Hardware</button>
                </div>
         
                <button id="btn-ver-carrito" class="btn btn-success ms-sm-auto px-4 rounded-pill shadow-sm" onclick="verCarrito()">
                    <i class="bi bi-cart4 me-2"></i>Ver Carrito <span id="contador-carrito" class="badge bg-white text-success rounded-circle ms-1">0</span>
                </button>
            </div>
        </section>

        <div class="mb-4">
            <h2 class="h4 fw-bold text-secondary-emphasis mb-1">Catálogo de Productos</h2>
            <p class="text-muted small mb-0">Seleccioná una categoría para filtrar los productos disponibles.</p>
        </div>

        <div id="lista-productos" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 mb-5"></div>
        <div id="paginacion-tienda" class="d-flex justify-content-center mt-4 align-items-center">
            <button id="btn-anterior" class="btn btn-outline-primary me-2">Anterior</button>
            <span id="info-pagina" class="mx-3">Página 1</span>
            <button id="btn-siguiente" class="btn btn-outline-primary">Siguiente</button>
        </div>
    </main>

    <footer class="bg-body-tertiary text-center py-3 border-top mt-auto">
        <div class="container">
            <p class="text-muted mb-1 fw-medium">TP - Programación III</p>
            <small class="text-muted">Desarrollado por: Busico Lautaro - Pertot Mabel - Raczkowski Martín</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/global.js"></script>
    <script src="../assets/js/pages/productos.js"></script>
</body>
</html>
